<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Eyes</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      #camera {
        display: none;
      }

      #view {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        display: block;
        background: #000;
      }
    </style>
  </head>
  <body>
    <video id="camera" playsinline muted autoplay></video>
    <canvas id="view"></canvas>
    <script type="module" src="./app.js"></script>
  </body>
</html>
